{% extends 'base.html' %}
{% block title %}Add Doctor – ClinicStock{% endblock %}

{% block page_header %}
<div class="page-header">
  <h1>+ Add <span>Doctor</span></h1>
  <a href="{{ url_for('doctors') }}" class="btn btn-outline">← Back</a>
</div>
{% endblock %}

{% block content %}
<div class="form-card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group full">
        <label>Doctor's Full Name</label>
        <input type="text" name="doctor_name" placeholder="e.g. Rajesh Mehta" required>
      </div>
      <div class="form-group full">
        <label>Specialization</label>
        <select name="specialization" required>
          <option value="" disabled selected>Select specialization</option>
          <option>General Physician</option>
          <option>Cardiologist</option>
          <option>Dermatologist</option>
          <option>Neurologist</option>
          <option>Orthopedist</option>
          <option>Pediatrician</option>
          <option>Gynecologist</option>
          <option>Ophthalmologist</option>
          <option>ENT Specialist</option>
          <option>Psychiatrist</option>
          <option>Dentist</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Available Time</label>
        <input type="text" name="available_time" placeholder="e.g. Mon-Fri 9AM-5PM" required>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Doctor</button>
      <a href="{{ url_for('doctors') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
